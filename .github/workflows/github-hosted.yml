name: GitHub Hosted Runner Demo

on:
  push:
    branches:
      - master

jobs:
  run-python-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Check Python Version
        run: python3 --version

      - name: Run Python File
        run: python3 app.py